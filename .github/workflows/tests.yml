name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (GTK4 / libadwaita / GObject-introspection)
        run: make install-sys-deps

      - name: Create virtualenv and install Python dependencies
        run: |
          make venv
          make setup

      - name: Run unit tests
        run: PYTHONPATH=src .venv/bin/python -m unittest discover -s tests -v
