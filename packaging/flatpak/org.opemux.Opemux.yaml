# Flatpak manifest for Opemux.
#
# Opemux is a GNOME-native front-end; it plays games through the *separately
# installed* RetroArch Flatpak (org.libretro.RetroArch), launched on the host via
# flatpak-spawn. RetroArch is therefore NOT bundled here — the manifest only
# packages the Python app and PyYAML.
#
# Local test build:
#   flatpak install -y flathub org.gnome.Platform//48 org.gnome.Sdk//48 org.flatpak.Builder
#   flatpak run org.flatpak.Builder --force-clean --user --install \
#     build-dir packaging/flatpak/org.opemux.Opemux.yaml
#   flatpak run org.opemux.Opemux
#
# For the Flathub submission, pin the `opemux` module source to a tagged commit.
app-id: org.opemux.Opemux
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: opemux

finish-args:
  # GTK UI
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Cover-art sync from the libretro thumbnail servers
  - --share=network
  # ROM library + cover writing, and reading the RetroArch Flatpak's cores dir
  - --filesystem=home
  # Launch the RetroArch Flatpak on the host via flatpak-spawn
  - --talk-name=org.freedesktop.Flatpak

cleanup:
  - '*.pyc'
  - /include
  - /lib/pkgconfig
  - /share/man

modules:
  - python3-pyyaml.yaml

  - name: opemux
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --no-build-isolation
        --prefix=${FLATPAK_DEST} .
      - install -Dm644 packaging/flatpak/org.opemux.Opemux.metainfo.xml
        ${FLATPAK_DEST}/share/metainfo/org.opemux.Opemux.metainfo.xml
      - install -Dm644 packaging/flatpak/org.opemux.Opemux.desktop
        ${FLATPAK_DEST}/share/applications/org.opemux.Opemux.desktop
      - install -Dm644 packaging/flatpak/org.opemux.Opemux.png
        ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/org.opemux.Opemux.png
      - install -Dm644 LICENSE
        ${FLATPAK_DEST}/share/licenses/org.opemux.Opemux/LICENSE
    sources:
      # Flathub builds from the app's git repo. Pin `commit:` (and `tag:`) to a
      # specific release for the Flathub PR. For a local test against uncommitted
      # changes, temporarily replace this with:  - type: dir\n    path: ../..
      - type: git
        url: https://github.com/guilhermefeitosa66/OpenEmux.git
        branch: main
