version: 1

script:
  - rm -rf AppDir appimage-builder-cache
  - mkdir -p AppDir/usr/lib/openemux
  - mkdir -p AppDir/usr/lib/python3/dist-packages
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/lib
  - mkdir -p AppDir/runtime/compat/usr/lib64
  - ln -sfn runtime/compat/usr/lib64 AppDir/lib64
  # appimage-builder's exec hooks chdir into runtime/compat before every exec,
  # and the bundled interpreter's ELF interpreter path is *relative*
  # ("lib64/ld-linux-x86-64.so.2"), so it is resolved from there. Without this
  # link the loader is unreachable and every exec of a bundled binary dies with
  # a bare "not found".
  - ln -sfn usr/lib64 AppDir/runtime/compat/lib64
  - cp -r src AppDir/usr/lib/openemux/
  - cp -r src/openemux AppDir/usr/lib/python3/dist-packages/
  - cp -r vendors AppDir/usr/lib/openemux/
  - cp requirements.lock AppDir/usr/lib/openemux/
  - cp README.md LICENSE AppDir/usr/lib/openemux/
  - grep -viE '^(pygobject|pycairo)==' requirements.lock > /tmp/openemux-pydeps.lock
  - python3 -m pip install --break-system-packages --no-cache-dir --target AppDir/usr/lib/python3/dist-packages -r /tmp/openemux-pydeps.lock
  # appimage-builder requires app_info.exec to be an ELF, so a tiny static
  # binary is the entry point and immediately hands over to openemux-run, which
  # sets up GI_TYPELIB_PATH / gdk-pixbuf / XDG_DATA_DIRS. (AppDir/AppRun is
  # generated and overwritten by appimage-builder, so it cannot host any of it.)
  - gcc -static packaging/appimage/openemux-launcher.c -O2 -s -o AppDir/usr/bin/openemux-launcher
  - install -Dm755 packaging/appimage/openemux-run.sh AppDir/usr/bin/openemux-run
  - install -Dm644 packaging/appimage/selftest.py AppDir/usr/lib/openemux/selftest.py
  - install -Dm755 packaging/appimage/gdk-pixbuf-query-loaders AppDir/usr/bin/gdk-pixbuf-query-loaders
  - ln -sf gdk-pixbuf-query-loaders AppDir/usr/bin/gdk-pixbuf-query-loaders-64
  - install -Dm644 packaging/common/openemux.desktop AppDir/usr/share/applications/io.github.guilhermefeitosa66.OpenEmux.desktop
  - install -Dm644 src/openemux/ui/assets/images/logo.png AppDir/usr/share/icons/hicolor/512x512/apps/io.github.guilhermefeitosa66.OpenEmux.png

AppDir:
  path: AppDir
  app_info:
    id: io.github.guilhermefeitosa66.OpenEmux
    name: OpenEmux
    icon: io.github.guilhermefeitosa66.OpenEmux
    version: "1.7.0"
    exec: usr/bin/openemux-launcher
  runtime:
    # Belt and braces alongside the launcher script: these are the paths the
    # bundle must never inherit from the host.
    env:
      GI_TYPELIB_PATH: "$APPDIR/usr/lib/x86_64-linux-gnu/girepository-1.0"
      GDK_PIXBUF_MODULEDIR: "$APPDIR/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders"
      GDK_PIXBUF_MODULE_FILE: "$APPDIR/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders.cache"
      XDG_DATA_DIRS: "$APPDIR/usr/share:/usr/local/share:/usr/share"
      OPENEMUX_PROJECT_ROOT: "$APPDIR/usr/lib/openemux"
  apt:
    arch: amd64
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ noble main universe
        key_url: "http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C"
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ noble-updates main universe
        key_url: "http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C"
    include:
      - python3
      - python3-gi
      - python3-cairo
      # The GI <-> cairo bridge (gi._gi_cairo). Without it, handing a
      # cairo.Context to a GI method raises
      # KeyError: 'could not find foreign type Context', which is exactly how
      # the cartridge frames stopped rendering in the bundle while working from
      # source (where the distro package is installed).
      - python3-gi-cairo
      - libgtk-4-1
      - libadwaita-1-0
      - gir1.2-gtk-4.0
      - gir1.2-adw-1
      - libgirepository-1.0-1
      - libglib2.0-0
      - libcairo2
      - libgdk-pixbuf-2.0-0
      - libgdk-pixbuf2.0-bin
      - shared-mime-info
      - hicolor-icon-theme
      # Symbolic icons used across the HIG UI (header bar, menus, rows, status
      # pages) live in adwaita-icon-theme; without it none of them render.
      - adwaita-icon-theme
      # SVG pixbuf loader needed to rasterize the (SVG) symbolic icons.
      - librsvg2-2
      # Rsvg bindings: the cartridge frames are SVGs composited at runtime.
      - gir1.2-rsvg-2.0
      - librsvg2-common
      # Cover art synced from libretro can be WebP, which is not one of
      # gdk-pixbuf's built-in formats.
      - webp-pixbuf-loader

AppImage:
  arch: x86_64
